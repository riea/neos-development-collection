privilegeTargets:

  'Neos\Flow\Security\Authorization\Privilege\Method\MethodPrivilege':

    'Neos.Restore.Ui:Backend.HardDeleteNodes':
      label: Allowed to hard delete Nodes
      matcher: 'method(Neos\Restore\Ui\Controller\RestoreController->hardDeleteAction())'

  'Neos\Neos\Security\Authorization\Privilege\ModulePrivilege':
    'Neos.Restore.Ui:Backend.Module.Management.Restore':
      label: General access to the restore module
      matcher: 'management/restore'

roles:
  'Neos.Neos:AbstractEditor':
    privileges:
      -
        privilegeTarget: 'Neos.Restore.Ui:Backend.Module.Management.Restore'
        permission: GRANT

  'Neos.Neos:Administrator':
    privileges:
      - privilegeTarget: 'Neos.Restore.Ui:Backend.HardDeleteNodes'
        permission: GRANT
